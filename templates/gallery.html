<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery - Car FPV Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .nav-buttons {
            text-align: center;
            margin-bottom: 20px;
        }

        .nav-buttons a {
            background: white;
            color: #667eea;
            padding: 12px 25px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        .nav-buttons a:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(0,0,0,0.3);
        }

        .controls-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-section {
            flex: 1;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-section label {
            font-weight: bold;
            color: #333;
        }

        .filter-section select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn-select-all {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-deselect-all {
            background: linear-gradient(135deg, #999 0%, #777 100%);
        }

        .btn-archive {
            background: linear-gradient(135deg, #FFA726 0%, #FB8C00 100%);
        }

        .btn-delete {
            background: linear-gradient(135deg, #f44336 0%, #da190b 100%);
        }

        .btn-view-archived {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
        }

        .stats {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .stat-item .number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-item .label {
            color: #666;
            margin-top: 5px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .image-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s;
            position: relative;
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .image-card.selected {
            border: 4px solid #667eea;
        }

        .image-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            cursor: pointer;
        }

        .image-info {
            padding: 15px;
        }

        .image-label {
            font-weight: bold;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .label-Forward {
            background: #4CAF50;
        }

        .label-Backward {
            background: #FF5722;
        }

        .label-Left {
            background: #2196F3;
        }

        .label-Right {
            background: #FF9800;
        }

        .label-Manual {
            background: #9C27B0;
        }

        .image-timestamp {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .image-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .tag {
            background: #667eea;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8em;
        }

        .checkbox-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
        }

        .checkbox-overlay input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal img {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 10px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
            font-size: 1.2em;
        }

        .empty-state i {
            font-size: 4em;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Image Gallery</h1>

        <div class="nav-buttons">
            <a href="/">← Back to Control Panel</a>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="number" id="total-images">0</div>
                <div class="label">Total Images</div>
            </div>
            <div class="stat-item">
                <div class="number" id="forward-count">0</div>
                <div class="label">Forward</div>
            </div>
            <div class="stat-item">
                <div class="number" id="backward-count">0</div>
                <div class="label">Backward</div>
            </div>
            <div class="stat-item">
                <div class="number" id="left-count">0</div>
                <div class="label">Left</div>
            </div>
            <div class="stat-item">
                <div class="number" id="right-count">0</div>
                <div class="label">Right</div>
            </div>
            <div class="stat-item">
                <div class="number" id="manual-count">0</div>
                <div class="label">Manual</div>
            </div>
        </div>

        <div class="controls-panel">
            <div class="filter-section">
                <label for="filter-label">Filter by Label:</label>
                <select id="filter-label" onchange="filterImages()">
                    <option value="all">All</option>
                    <option value="Forward">Forward</option>
                    <option value="Backward">Backward</option>
                    <option value="Left">Left</option>
                    <option value="Right">Right</option>
                    <option value="Manual">Manual</option>
                </select>
            </div>

            <div class="action-buttons">
                <button class="btn-select-all" onclick="selectAll()">Select All</button>
                <button class="btn-deselect-all" onclick="deselectAll()">Deselect All</button>
                <button class="btn-archive" onclick="archiveSelected()">Archive Selected</button>
                <button class="btn-delete" onclick="deleteSelected()">Delete Selected</button>
                <button class="btn-view-archived" onclick="viewArchived()">View Archived</button>
            </div>
        </div>

        <div id="gallery-grid" class="gallery-grid">
            <div class="empty-state">
                <span style="font-size: 4em;">📷</span>
                <p>No images captured yet. Start driving to capture images!</p>
            </div>
        </div>
    </div>

    <!-- Image Modal -->
    <div id="image-modal" class="modal" onclick="closeModal()">
        <span class="modal-close">×</span>
        <img id="modal-image" src="" alt="Full size image">
    </div>

    <script>
        let allImages = [];
        let selectedImages = new Set();

        // Load images on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadImages();
        });

        async function loadImages() {
            try {
                const response = await fetch('/images');
                const data = await response.json();

                if (response.ok) {
                    allImages = data.images;
                    updateStats();
                    filterImages();
                }
            } catch (error) {
                console.error('Failed to load images:', error);
            }
        }

        function updateStats() {
            const stats = {
                total: 0,
                Forward: 0,
                Backward: 0,
                Left: 0,
                Right: 0,
                Manual: 0
            };

            allImages.forEach(img => {
                stats.total++;
                const label = img.label || 'Manual';
                stats[label] = (stats[label] || 0) + 1;
            });

            document.getElementById('total-images').textContent = stats.total;
            document.getElementById('forward-count').textContent = stats.Forward;
            document.getElementById('backward-count').textContent = stats.Backward;
            document.getElementById('left-count').textContent = stats.Left;
            document.getElementById('right-count').textContent = stats.Right;
            document.getElementById('manual-count').textContent = stats.Manual;
        }

        function filterImages() {
            const filter = document.getElementById('filter-label').value;
            const filteredImages = filter === 'all'
                ? allImages
                : allImages.filter(img => img.label === filter);

            displayImages(filteredImages);
        }

        function displayImages(images) {
            const grid = document.getElementById('gallery-grid');

            if (images.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <span style="font-size: 4em;">📷</span>
                        <p>No images found for this filter.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            images.reverse().forEach(img => {
                const label = img.label || 'Manual';
                const isSelected = selectedImages.has(img.filename);
                const tagsHtml = img.tags && img.tags.length > 0
                    ? img.tags.map(tag => `<span class="tag">${tag}</span>`).join('')
                    : '';

                html += `
                    <div class="image-card ${isSelected ? 'selected' : ''}" data-filename="${img.filename}">
                        <div class="checkbox-overlay">
                            <input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelection('${img.filename}')">
                        </div>
                        <img src="/image/${img.filepath}" alt="${img.filename}" onclick="openModal('/image/${img.filepath}')">
                        <div class="image-info">
                            <div class="image-label label-${label}">${label}</div>
                            <div class="image-timestamp">${img.timestamp}</div>
                            <div class="image-tags">${tagsHtml}</div>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        function toggleSelection(filename) {
            if (selectedImages.has(filename)) {
                selectedImages.delete(filename);
            } else {
                selectedImages.add(filename);
            }

            const card = document.querySelector(`[data-filename="${filename}"]`);
            card.classList.toggle('selected');
        }

        function selectAll() {
            const filter = document.getElementById('filter-label').value;
            const filteredImages = filter === 'all'
                ? allImages
                : allImages.filter(img => img.label === filter);

            filteredImages.forEach(img => selectedImages.add(img.filename));
            filterImages();
        }

        function deselectAll() {
            selectedImages.clear();
            filterImages();
        }

        async function archiveSelected() {
            if (selectedImages.size === 0) {
                alert('Please select images to archive');
                return;
            }

            if (!confirm(`Archive ${selectedImages.size} image(s)?`)) {
                return;
            }

            try {
                const response = await fetch('/archive_images', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filenames: Array.from(selectedImages) })
                });

                const data = await response.json();

                if (response.ok) {
                    alert(`Successfully archived ${data.archived_count} image(s)`);
                    selectedImages.clear();
                    loadImages();
                } else {
                    alert('Failed to archive images: ' + data.error);
                }
            } catch (error) {
                console.error('Archive error:', error);
                alert('Archive error: ' + error.message);
            }
        }

        async function deleteSelected() {
            if (selectedImages.size === 0) {
                alert('Please select images to delete');
                return;
            }

            if (!confirm(`Permanently delete ${selectedImages.size} image(s)? This cannot be undone!`)) {
                return;
            }

            try {
                const response = await fetch('/delete_images', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filenames: Array.from(selectedImages) })
                });

                const data = await response.json();

                if (response.ok) {
                    alert(`Successfully deleted ${data.deleted_count} image(s)`);
                    selectedImages.clear();
                    loadImages();
                } else {
                    alert('Failed to delete images: ' + data.error);
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert('Delete error: ' + error.message);
            }
        }

        function viewArchived() {
            alert('Archived images viewer coming soon!');
            // TODO: Implement archived images view
        }

        function openModal(imagePath) {
            document.getElementById('modal-image').src = imagePath;
            document.getElementById('image-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('image-modal').style.display = 'none';
        }

        // Close modal on Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
